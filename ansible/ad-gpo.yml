---
# Load datas
- import_playbook: data.yml
  vars:
    data_path: "../ad/{{domain_name}}/data/"
  tags: 'data'

# set AD datas ==================================================================================================

- name: GPO inside AD
  hosts: dc
  roles:
  - { role: 'gpo', tags: 'gpo'}
  vars:
    domain: "{{lab.hosts[dict_key].domain}}"
