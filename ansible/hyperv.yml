---
# Load datas
- import_playbook: data.yml
  vars:
    data_path: "../ad/{{domain_name}}/data/"
  tags: 'data'

- name: "HyperV: Install HyperV and create virtual switch"
  hosts: hyperv
  roles:
    - role: hyperv
  vars:
    switch_name: "network-switch-1"
    switch_ip: "172.16.100.1"
    switch_prefix: 24
    nat_name: "network-nat"
    nat_network: "172.16.100.0/24"